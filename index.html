<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Used Books Sale</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #243447;
      color: white;
      padding: 24px;
      text-align: center;
    }
    .wrap {
      max-width: 1300px;
      margin: 20px auto;
      padding: 0 15px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      background: #ddd;
    }
    .card-body {
      padding: 12px;
    }
    .book-id {
      font-size: 12px;
      color: #666;
      font-weight: bold;
    }
    h3 {
      font-size: 15px;
      min-height: 42px;
      margin: 6px 0;
    }
    .price {
      font-size: 20px;
      font-weight: bold;
      color: #0b6b35;
      margin: 8px 0;
    }
    button {
      border: 0;
      background: #0b6bff;
      color: white;
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: .9; }
    .cart {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      position: sticky;
      top: 15px;
      max-height: 90vh;
      overflow: auto;
    }
    .cart-item {
      border-bottom: 1px solid #eee;
      padding: 8px 0;
      font-size: 14px;
    }
    .qty {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      margin-top: 5px;
    }
    .qty button {
      padding: 3px 8px;
      background: #555;
    }
    .total {
      font-size: 22px;
      font-weight: bold;
      margin: 15px 0;
    }
    .print-btn {
      background: #111;
      width: 100%;
      margin-top: 8px;
    }
    .clear-btn {
      background: #b00020;
      width: 100%;
      margin-top: 8px;
    }
    #receipt {
      display: none;
    }

    .search-box {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      margin-bottom: 18px;
      position: relative;
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    #searchInput {
      flex: 1;
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }
    .suggestions {
      position: absolute;
      left: 15px;
      right: 92px;
      top: 62px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      max-height: 230px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }
    .suggestions div {
      padding: 9px 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .suggestions div:hover {
      background: #eef4ff;
    }
    .no-results {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      color: #666;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    @media print {
      header, .grid, .search-box, .cart h2, .cart #cartItems, .cart .total, .cart button, .cart p { display: none !important; }
      body { background: white; }
      .layout { display: block; }
      .cart { box-shadow: none; position: static; }
      #receipt { display: block; }
    }
    @media (max-width: 850px) {
      .layout { grid-template-columns: 1fr; }
      .cart { position: static; }
    }
  </style>
</head>
<body>

          </div>
          <div id="suggestions" class="suggestions"></div>
        </div>
        <div class="grid" id="productGrid"></div>
      </main>

      <aside class="cart">
        <h2>Shopping Cart</h2>
        <p>Add books, then print receipt for sale.</p>
        <div id="cartItems">Cart is empty.</div>
        <div class="total" id="total">Total: $0</div>
        <button class="print-btn" onclick="printReceipt()">Print Receipt</button>
        <button class="print-btn" onclick="downloadReceiptImage()">Download Receipt Image</button>
        <button class="print-btn" onclick="sendReceiptEmail()">Send Email</button>
        <button class="print-btn" onclick="sendReceiptText()">Send Text Message</button>
        <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
        <div id="receipt"></div>
      </aside>
    </div>

let cart = {};

let filteredProducts = products;

function renderProducts(list = filteredProducts) {
  const grid = document.getElementById('productGrid');
  if (list.length === 0) {
    grid.innerHTML = `<div class="no-results">No books found.</div>`;
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="card">
      <img src="${p.image}" alt="${p.name}">
      <div class="card-body">
        <div class="book-id">${p.id}</div>
        <h3>${p.name}</h3>
        <div class="price">$${p.price}</div>
        <button onclick="addToCart('${p.id}')">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

function showSuggestions() {
  const input = document.getElementById('searchInput');
  const box = document.getElementById('suggestions');
  const q = input.value.trim().toLowerCase();

  if (!q) {
    box.style.display = 'none';
    filteredProducts = products;
    renderProducts();
    return;
  }

  const matches = products
    .filter(p => p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q))
    .slice(0, 8);

  if (matches.length === 0) {
    box.innerHTML = `<div>No match found</div>`;
    box.style.display = 'block';
    return;
  }

  box.innerHTML = matches.map(p => `
    <div onclick="selectSuggestion('${p.id}')">${p.id} - ${p.name} ($${p.price})</div>
  `).join('');
  box.style.display = 'block';
}

function selectSuggestion(id) {
  const p = products.find(x => x.id === id);
  document.getElementById('searchInput').value = p.name;
  document.getElementById('suggestions').style.display = 'none';
  filteredProducts = [p];
  renderProducts();
}

function searchBooks() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('suggestions').style.display = 'none';

  if (!q) {
    filteredProducts = products;
  } else {
    filteredProducts = products.filter(p =>
      p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)
    );
  }
  renderProducts();
}

function handleSearchKey(event) {
  if (event.key === 'Enter') {
    searchBooks();
  }
}

document.addEventListener('click', function(e) {
  const searchBox = document.querySelector('.search-box');
  if (searchBox && !searchBox.contains(e.target)) {
    document.getElementById('suggestions').style.display = 'none';
  }
});

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  renderCart();
}

function changeQty(id, diff) {
  cart[id] = (cart[id] || 0) + diff;
  if (cart[id] <= 0) delete cart[id];
  renderCart();
}

function renderCart() {
  const cartItems = document.getElementById('cartItems');
  let rows = Object.entries(cart);
  if (rows.length === 0) {
    cartItems.innerHTML = "Cart is empty.";
    document.getElementById('total').innerText = "Total: $0";
    return;
  }
  let total = 0;
  cartItems.innerHTML = rows.map(([id, qty]) => {
    const p = products.find(x => x.id === id);
    const line = p.price * qty;
    total += line;
    return `
      <div class="cart-item">
        <strong>${p.name}</strong><br>
        $${p.price} × ${qty} = <strong>$${line}</strong>
        <div class="qty">
          <button onclick="changeQty('${id}', -1)">−</button>
          <span>${qty}</span>
          <button onclick="changeQty('${id}', 1)">+</button>
        </div>
      </div>`;
  }).join('');
  document.getElementById('total').innerText = "Total: $" + total;
}

function printReceipt() {
  let rows = Object.entries(cart);
  if (rows.length === 0) {
    alert("Cart is empty.");
    return;
  }
  let total = 0;
  let date = new Date().toLocaleString();
  let receipt = `<h1>Book Sale Receipt</h1><p>${date}</p><hr>`;
  receipt += `<table style="width:100%; border-collapse:collapse;">
    <tr><th align="left">Book</th><th>Qty</th><th>Price</th><th>Total</th></tr>`;
  rows.forEach(([id, qty]) => {
    const p = products.find(x => x.id === id);
    const line = p.price * qty;
    total += line;
    receipt += `<tr>
      <td>${p.name}</td><td align="center">${qty}</td><td align="center">$${p.price}</td><td align="right">$${line}</td>
    </tr>`;
  });
  receipt += `</table><hr><h2>Total: $${total}</h2><p>Thank you!</p>`;
  document.getElementById('receipt').innerHTML = receipt;
  window.print();
}


function buildReceiptData() {
  let rows = Object.entries(cart);
  if (rows.length === 0) {
    alert("Cart is empty.");
    return null;
  }
  let total = 0;
  let lines = rows.map(([id, qty]) => {
    const p = products.find(x => x.id === id);
    const line = p.price * qty;
    total += line;
    return { id, name: p.name, qty, price: p.price, line };
  });
  return { date: new Date().toLocaleString(), lines, total };
}

function getReceiptText() {
  const data = buildReceiptData();
  if (!data) return null;
  let text = "Book Sale Receipt\n";
  text += data.date + "\n\n";
  data.lines.forEach(item => {
    text += `${item.name} | Qty: ${item.qty} | $${item.price} | Total: $${item.line}\n`;
  });
  text += `\nGrand Total: $${data.total}\nThank you!`;
  return text;
}

function downloadReceiptImage() {
  const data = buildReceiptData();
  if (!data) return;

  const canvas = document.createElement("canvas");
  canvas.width = 900;
  canvas.height = 220 + data.lines.length * 42;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#111";
  ctx.font = "bold 34px Arial";
  ctx.fillText("Book Sale Receipt", 35, 50);

  ctx.font = "18px Arial";
  ctx.fillText(data.date, 35, 85);

  ctx.strokeStyle = "#333";
  ctx.beginPath();
  ctx.moveTo(35, 110);
  ctx.lineTo(865, 110);
  ctx.stroke();

  let y = 145;
  ctx.font = "bold 18px Arial";
  ctx.fillText("Book", 35, y);
  ctx.fillText("Qty", 560, y);
  ctx.fillText("Price", 650, y);
  ctx.fillText("Total", 760, y);

  ctx.font = "17px Arial";
  y += 35;
  data.lines.forEach(item => {
    let name = item.name.length > 45 ? item.name.substring(0, 42) + "..." : item.name;
    ctx.fillText(name, 35, y);
    ctx.fillText(String(item.qty), 570, y);
    ctx.fillText("$" + item.price, 660, y);
    ctx.fillText("$" + item.line, 770, y);
    y += 38;
  });

  ctx.beginPath();
  ctx.moveTo(35, y);
  ctx.lineTo(865, y);
  ctx.stroke();

  y += 45;
  ctx.font = "bold 28px Arial";
  ctx.fillText("Grand Total: $" + data.total, 35, y);

  const link = document.createElement("a");
  link.download = "book-sale-receipt.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function sendReceiptEmail() {
  const text = getReceiptText();
  if (!text) return;
  const subject = encodeURIComponent("Book Sale Receipt");
  const body = encodeURIComponent(text + "\n\nNote: To include the receipt image, click 'Download Receipt Image' and attach it manually.");
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function sendReceiptText() {
  const text = getReceiptText();
  if (!text) return;
  const body = encodeURIComponent(text);
  window.location.href = `sms:?&body=${body}`;
}


function clearCart() {
  cart = {};
  renderCart();
}

renderProducts();
renderCart();
