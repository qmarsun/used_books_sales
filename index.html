<!DOCTYPE html>
<html>
<head>
  <title>Used Books Sale</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; margin:20px; }
    h1 { text-align:center; }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:20px;
    }
    .box {
      background:white;
      border-radius:12px;
      padding:12px;
      box-shadow:0 2px 8px #ccc;
      text-align:center;
    }
    .box img {
      width:100%;
      height:220px;
      object-fit:contain;
      background:#eee;
      border-radius:8px;
    }
    .title {
      font-weight:bold;
      margin:10px 0;
      min-height:40px;
    }
    .price { color:green; font-size:20px; }
    button {
      background:#007bff;
      color:white;
      border:0;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>Used Books Sale</h1>

<div class="grid" id="bookGrid"></div>

<script>
const books = [];

for (let i = 1; i <= 48; i++) {
  const num = String(i).padStart(2, "0");
  books.push({
    id: "B" + String(i).padStart(3, "0"),
    title: "Book " + i,
    image: "images/book_" + num + ".jpg",
    price: Math.floor(Math.random() * 5) + 5
  });
}

const grid = document.getElementById("bookGrid");

books.forEach(book => {
  grid.innerHTML += `
    <div class="box">
      <img src="${book.image}" alt="${book.title}">
      <div class="title">${book.id} - ${book.title}</div>
      <div class="price">$${book.price}</div>
      <br>
      <button>Add to Cart</button>
    </div>
  `;
});
</script>

</body>
</html>
